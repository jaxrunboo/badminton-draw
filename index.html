<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>羽毛球队伍抽签</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    .draw-anim { animation: roll 0.2s ease-in-out infinite; }
    @keyframes roll { 0% { transform: scale(1); } 50% { transform: scale(1.05); } 100% { transform: scale(1); } }
  </style>
</head>
<body class="bg-slate-50 min-h-screen text-slate-800">
  <div class="max-w-6xl mx-auto p-4 md:p-6">
    <header class="text-center mb-8">
      <h1 class="text-3xl md:text-4xl font-extrabold text-slate-900 tracking-tight">🏸 羽毛球队伍抽签</h1>
      <p class="text-slate-500 mt-2">公平、随机、一键分队</p>
    </header>

    <button id="drawBtn" onclick="startDraw()" class="w-full max-w-lg mx-auto block py-5 bg-indigo-600 hover:bg-indigo-700 text-white rounded-2xl text-xl font-bold shadow-xl transition-all active:scale-95">🎲 开始随机抽签</button>

    <div id="result" class="mt-10 grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-4">
      <!-- 抽签结果卡片 -->
    </div>
  </div>

  <script>
    const data = {
      tiers: {
        A: ["张三", "李四", "王五", "赵六", "钱七", "孙八", "周九", "吴十"],
        B: ["甲一", "甲二", "甲三", "甲四", "甲五", "甲六", "甲七", "甲八"],
        C: ["乙一", "乙二", "乙三", "乙四", "乙五", "乙六", "乙七", "乙八"],
        D: ["丙一", "丙二", "丙三", "丙四", "丙五", "丙六", "丙七", "丙八"],
        E: ["丁一", "丁二", "丁三", "丁四", "丁五", "丁六", "丁七", "丁八"]
      }
    };

    function startDraw() {
      const btn = document.getElementById('drawBtn');
      const res = document.getElementById('result');
      
      btn.classList.add('draw-anim');
      btn.innerText = "🎲 抽签运算中...";
      
      setTimeout(() => {
        let teams = Array.from({length: 8}, () => []);
        Object.keys(data.tiers).forEach(t => {
          let members = [...data.tiers[t]].sort(() => Math.random() - 0.5);
          members.forEach((m, i) => teams[i % 8].push(m));
        });
        
        res.innerHTML = teams.map((t, i) => `
          <div class="bg-white p-5 rounded-2xl shadow-sm border border-slate-100 hover:shadow-md transition">
            <h3 class="font-bold text-indigo-600 mb-3 text-lg border-b pb-2">第 ${i+1} 队</h3>
            <div class="space-y-1">
              ${t.map(p => `<div class="text-slate-600 bg-slate-50 px-3 py-1.5 rounded-lg text-sm font-medium">${p}</div>`).join('')}
            </div>
          </div>
        `).join('');
        
        btn.classList.remove('draw-anim');
        btn.innerText = "🎲 开始随机抽签";
      }, 1500);
    }
  </script>
</body>
</html>
