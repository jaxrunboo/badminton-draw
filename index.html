<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <title>羽毛球队伍抽签</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50 min-h-screen">
  <div id="app" class="max-w-4xl mx-auto p-4">
    <h1 class="text-3xl font-bold text-center mb-8 text-gray-800">羽毛球队伍抽签</h1>
    <div id="tiers" class="grid grid-cols-1 md:grid-cols-5 gap-4 mb-8">
      <!-- 梯队列表会在 render 后渲染 -->
    </div>
    <button id="drawBtn" onclick="startDraw()" class="w-full py-6 bg-indigo-600 text-white rounded-2xl text-2xl font-bold shadow-lg hover:bg-indigo-700 transition">🎲 开始抽签</button>
    <div id="result" class="mt-8 grid grid-cols-1 md:grid-cols-2 gap-4"></div>
  </div>

  <script>
    const data = {
      tiers: {
        A: ["张三", "李四", "王五", "赵六", "钱七", "孙八", "周九", "吴十"],
        B: ["甲一", "甲二", "甲三", "甲四", "甲五", "甲六", "甲七", "甲八"],
        C: ["乙一", "乙二", "乙三", "乙四", "乙五", "乙六", "乙七", "乙八"],
        D: ["丙一", "丙二", "丙三", "丙四", "丙五", "丙六", "丙七", "丙八"],
        E: ["丁一", "丁二", "丁三", "丁四", "丁五", "丁六", "丁七", "丁八"]
      }
    };

    function renderTiers() {
      const container = document.getElementById('tiers');
      container.innerHTML = Object.keys(data.tiers).map(t => `
        <div class="bg-white p-4 rounded-xl shadow">
          <h2 class="font-bold text-center mb-2 border-b">梯队 ${t}</h2>
          ${data.tiers[t].map(p => `<div class="text-sm py-1 border-b last:border-0">${p}</div>`).join('')}
        </div>
      `).join('');
    }

    function startDraw() {
      const btn = document.getElementById('drawBtn');
      btn.innerText = "🎲 抽签中...";
      btn.classList.add('animate-pulse');
      
      setTimeout(() => {
        let teams = Array.from({length: 8}, () => []);
        Object.keys(data.tiers).forEach(t => {
          let members = [...data.tiers[t]].sort(() => Math.random() - 0.5);
          members.forEach((m, i) => teams[i % 8].push(m));
        });
        
        document.getElementById('result').innerHTML = teams.map((t, i) => `
          <div class="bg-white p-4 rounded-xl shadow border-l-4 border-indigo-500">
            <h3 class="font-bold text-indigo-800 mb-2">第 ${i+1} 队</h3>
            ${t.map(p => `<span class="inline-block bg-indigo-50 text-indigo-700 rounded-full px-3 py-1 m-1 text-sm">${p}</span>`).join('')}
          </div>
        `).join('');
        
        btn.innerText = "🎲 开始抽签";
        btn.classList.remove('animate-pulse');
      }, 1500);
    }

    renderTiers();
  </script>
</body>
</html>
